version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - julius-data:/app/backend/database
      - julius-sandbox:/app/backend/sandbox
    env_file: .env
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  tor:
    image: dperson/torproxy
    ports:
      - "9150:9150"
    restart: unless-stopped

volumes:
  julius-data:
  julius-sandbox:
